<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Popup</title>
    <style>
        .video-container {
            cursor: pointer;
            margin: 10px;
            position: relative;
            display: inline-block;
        }
        .video-container video {
            display: none; /* Скрываем видео */
        }
        .video-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }
        .popup video {
            max-width: 90%;
            max-height: 90%;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<!-- Пример видео с классом video-container -->
<div class="video-container">
    <video src="video-reviews/review-1.MP4" poster="img/finishing.jpg"></video>
    <img src="img/finishing.jpg" alt="Poster 1">
</div>

<!-- Попап -->
<div class="popup">
    <span class="close-btn">&times;</span>
    <video controls></video>
</div>

<script>
    // Функция для поиска всех видео с определённым CSS-классом
    function findVideosWithClass(className) {
        const videoContainers = document.querySelectorAll(`.${className}`);
        const popup = document.querySelector('.popup');
        const popupVideo = popup.querySelector('video');
        const closeBtn = popup.querySelector('.close-btn');

        videoContainers.forEach(container => {
            const img = container.querySelector('img');
            const video = container.querySelector('video');

            img.addEventListener('click', () => {
                popupVideo.src = video.src; // Устанавливаем src видео в попап
                popup.style.display = 'flex'; // Показываем попап
            });
        });

        closeBtn.addEventListener('click', () => {
            popupVideo.src = ''; // Очищаем видео
            popup.style.display = 'none'; // Скрываем попап
        });
    }

    // Вызов функции с классом video-container
    findVideosWithClass('video-container');
</script>
</body>
</html>
